<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoChat & Games - التطبيق الرسمي</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: #0b0e11; color: #eaecef; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        
        .login-container { text-align: center; background: #151a21; padding: 40px 30px; border-radius: 16px; border: 1px solid #f3ba2f; max-width: 400px; width: 90%; }
        .logo { font-size: 2.5rem; font-weight: bold; color: #f3ba2f; margin-bottom: 10px; }
        .tagline { color: #90baee; font-size: 0.95rem; margin-bottom: 30px; }
        .btn-connect { background-color: #f3ba2f; color: #000000; border: none; padding: 14px 28px; font-size: 1.1rem; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn-connect:hover { background-color: #fdd05b; }
        
        .chat-container { display: none; width: 100%; height: 100vh; grid-template-columns: 320px 1fr; }
        .sidebar { background-color: #151a21; border-left: 1px solid #212833; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; background-color: #1e2530; font-weight: bold; border-bottom: 1px solid #212833; color: #f3ba2f; text-align: center; }
        .wallet-list { list-style: none; overflow-y: auto; flex: 1; }
        .wallet-item { padding: 15px 20px; border-bottom: 1px solid #1e2530; font-size: 0.85rem; color: #ffffff; text-align: center; font-weight: bold; }
        
        .sidebar-games-box { padding: 15px; background: #1e2530; border-bottom: 1px solid #212833; display: flex; flex-direction: column; gap: 8px; }
        .sidebar-games-box label { font-size: 0.85rem; color: #f3ba2f; text-align: center; font-weight: bold; margin-bottom: 2px; }
        .btn-game { background-color: #212833; color: #ffffff; border: 1px solid #4f5d73; padding: 10px; border-radius: 6px; cursor: pointer; font-size: 0.9rem; font-weight: bold; transition: 0.2s; text-align: center; }
        .btn-game:hover { background-color: #2b3542; border-color: #f3ba2f; color: #f3ba2f; }

        .sidebar-deposit-box { padding: 20px 15px; background: #1e2530; border-top: 1px solid #212833; display: flex; flex-direction: column; gap: 10px; }
        .sidebar-deposit-box label { font-size: 0.85rem; color: #00ff88; text-align: center; font-weight: bold; }
        .sidebar-deposit-box input { background: #0b0e11; border: 1px solid #2b3542; padding: 10px; border-radius: 6px; color: white; text-align: center; outline: none; font-size: 1rem; }
        .sidebar-deposit-box button { background: #00ff88; color: black; border: none; padding: 12px; font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 0.95rem; transition: 0.2s; }
        .sidebar-deposit-box button:hover { background: #02e078; }

        .main-chat { display: flex; flex-direction: column; background-color: #0b0e11; width: 100%; }
        
        .navigation-tabs { display: flex; background: #151a21; border-bottom: 1px solid #212833; }
        .tab-btn { flex: 1; padding: 18px; background: none; border: none; color: #b7bdc6; font-weight: bold; cursor: pointer; transition: 0.3s; text-align: center; font-size: 1rem; }
        .tab-btn.active { color: #f3ba2f; background: #1e2530; border-bottom: 4px solid #f3ba2f; }

        .chat-header { padding: 15px 20px; background-color: #151a21; border-bottom: 1px solid #212833; font-size: 0.95rem; color: #ffffff; line-height: 1.5; }
        .messages-area { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        
        .message { max-width: 70%; padding: 12px 16px; border-radius: 12px; font-size: 0.95rem; display: flex; flex-direction: column; gap: 5px; line-height: 1.4; }
        .message.sent { background-color: #f3ba2f; color: #000000; align-self: flex-start; border-top-right-radius: 0; }
        .message.received { background-color: #1e2530; color: #eaecef; align-self: flex-end; border-top-left-radius: 0; }
        .message img { max-width: 100%; max-height: 250px; border-radius: 8px; margin-top: 5px; object-fit: cover; }
        .message audio { max-width: 100%; margin-top: 5px; outline: none; }
        
        .input-area-wrapper { background-color: #151a21; display: flex; flex-direction: column; padding: 15px 20px; gap: 8px; border-top: 1px solid #212833; }
        .recipient-row { display: none; align-items: center; gap: 10px; background: #1e2530; padding: 10px 12px; border-radius: 6px; border: 1px solid #2b3542; }
        .recipient-row label { font-size: 0.85rem; color: #f3ba2f; white-space: nowrap; font-weight: bold; }
        .recipient-row input { flex: 1; background-color: #0b0e11; border: 1px solid #2b3542; padding: 8px 12px; border-radius: 4px; color: #ffffff; font-size: 0.85rem; outline: none; }
        
        .input-area { display: flex; gap: 10px; width: 100%; align-items: center; }
        .input-area input { flex: 1; background-color: #212833; border: 1px solid #2b3542; padding: 14px; border-radius: 8px; color: #ffffff; outline: none; font-size: 0.95rem; }
        
        .media-actions { display: flex; gap: 6px; }
        .btn-media { background-color: #2b3542; color: #ffffff; border: 1px solid #4f5d73; padding: 12px; border-radius: 8px; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; transition: 0.2s; position: relative; width: 48px; height: 48px; }
        .btn-media input[type="file"] { position: absolute; width: 100%; height: 100%; opacity: 0; cursor: pointer; top: 0; left: 0; }
        .btn-media.recording { background-color: #ff3333; border-color: #ff0000; animation: pulse 1.5s infinite; }
        
        .btn-send { background-color: #f3ba2f; color: #000000; border: none; padding: 0 24px; height: 48px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @media (max-width: 768px) { .chat-container { grid-template-columns: 1fr; } .sidebar { display: none; } }
    </style>
</head>
<body>

    <div class="login-container" id="loginScreen">
        <div class="logo">CryptoChat</div>
        <div class="tagline">تراسل آمن وجاد يدعمه عقد عملة SINU الذكي وقاعدة بيانات هجينة</div>
        <button class="btn-connect" onclick="connectWallet()">ربط المحفظة الحقيقية</button>
    </div>

    <div class="chat-container" id="chatScreen">
        <div class="sidebar">
            <div class="sidebar-header">المحفظة النشطة</div>
            <ul class="wallet-list">
                <li class="wallet-item" id="activeWalletLabel">0x...</li>
            </ul>
            
            <div class="sidebar-games-box">
                <label>🎮 منصة ألعاب SINU</label>
                <button class="btn-game" onclick="playGame('luck')">🎰 لعبة الحظ (قريباً)</button>
                <button class="btn-game" onclick="playGame('prediction')">📈 توقعات السعر</button>
                <button class="btn-game" onclick="playGame('mafia')">🕵️‍♂️ سينو مافيا</button>
            </div>
            
            <div class="sidebar-deposit-box">
                <label>📥 شحن رصيد المراسلة (SINU)</label>
                <input type="number" id="depositAmount" placeholder="الكمية المراد شحنها" min="1" value="100">
                <button onclick="handleUIDeposit()">تعبئة الرصيد الآن 🚀</button>
            </div>
        </div>
        
        <div class="main-chat">
            <div class="navigation-tabs">
                <button class="tab-btn active" id="tabGroup" onclick="switchChatMode('group')">المنشورات العامة 🌐 (قاعدة بيانات مجانية)</button>
                <button class="tab-btn" id="tabPrivate" onclick="switchChatMode('private')">المراسلة الخاصة 🔒 (خصم عبر العقد)</button>
            </div>

            <div class="chat-header" id="chatHeader">المحادثة النشطة | جاري تحميل البيانات...</div>
            <div class="messages-area" id="messagesArea"></div>
            
            <div class="input-area-wrapper">
                <div class="recipient-row" id="recipientRow">
                    <label for="recipientAddress">عنوان محفظة المستلم:</label>
                    <input type="text" id="recipientAddress" placeholder="أدخل عنوان المحفظة للطرف الآخر (0x...)">
                </div>
                
                <div class="input-area">
                    <div class="media-actions">
                        <button class="btn-media" title="رفع صورة">
                            🖼️
                            <input type="file" id="imageUploader" accept="image/*" onchange="handleLocalFileChange(this, 2)">
                        </button>
                        <button class="btn-media" id="voiceRecordBtn" title="تسجيل صوتي حي" onclick="toggleVoiceRecording()">
                            🎙️
                        </button>
                    </div>
                    
                    <input type="text" id="messageInput" placeholder="اكتب رسالة أو منشور هنا...">
                    <button class="btn-send" onclick="sendMessage(1)">إرسال</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // تكوين الـ Firebase الخاص بك (استبدل هذه البيانات ببيانات مشروعك الخاصة)

        // تكوين الـ Firebase الخاص بك (تم التحديث ببياناتك الحقيقية ورابط قاعدة البيانات)

        // تكوين الـ Firebase الخاص بك (تم دمج بياناتك المستخرجة بنجاح)
     const firebaseConfig = {
           apiKey: "AIzaSyAjANzHrD-JEEN_4DVIY705ECcJTvl4lQk",
           authDomain: "kriptochat-bf77a.firebaseapp.com",
           databaseURL: "https://kriptochat-bf77a-default-rtdb.firebaseio.com", // الرابط السري لقاعدتك العامة
           projectId: "kriptochat-bf77a",
           storageBucket: "kriptochat-bf77a.firebasestorage.app",
          messagingSenderId: "438561797154",
          appId: "1:438561797154:web:26e5b2eda081e0eac2467b"
        };
        
        // تشغيل مكتبة الفايربيس للعمل الفوري في الموقع
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const chatContractAddress = "0x690192AEeE16c40f6f7d0CA30BAA1B0884259068"; 
        const sinuTokenAddress = "0x56bB247c424958948B63de291A0C7f45d8651B76"; 

        // متوافق تماماً وبنسبة 100% مع الـ ABI الخاص بعقدك الحالي المرفوع بدون دوال العام
        const chatAbi = [
            "constructor(address _sinuTokenAddress)",
            "function costImage() view returns (uint256)",
            "function costText() view returns (uint256)",
            "function costVoice() view returns (uint256)",
            "function deductForService(address _user, uint256 _serviceType)",
            "function depositSinu(uint256 _amountWithDecimals)",
            "function getInAppBalance(address _user) view returns (uint256)",
            "function owner() view returns (address)",
            "function sinuToken() view returns (address)",
            "function totalOwnerEarnings() view returns (uint256)",
            "function updatePrices(uint256 _textWei, uint256 _imageWei, uint256 _voiceWei)",
            "function withdrawEarnings()"
        ];

        const tokenAbi = [
            "function approve(address spender, uint256 amount) external returns (bool)",
            "function balanceOf(address account) view returns (uint256)"
        ];

        let provider, signer, chatContract, tokenContract, userAddress;
        let inAppBalance = 0;
        let isGroupChat = true; 

        let priceText = 300; 
        let priceImage = 500;
        let priceVoice = 1000;

        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;

        async function connectWallet() {
            if (typeof window.ethereum !== 'undefined') {
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    userAddress = accounts[0];

                    provider = new ethers.providers.Web3Provider(window.ethereum);
                    signer = provider.getSigner();

                    chatContract = new ethers.Contract(chatContractAddress, chatAbi, signer);
                    tokenContract = new ethers.Contract(sinuTokenAddress, tokenAbi, signer);

                    document.getElementById('activeWalletLabel').innerText = userAddress.substring(0, 6) + "..." + userAddress.substring(38);

                    await refreshUserData();
                    
                    // الاستماع للمنشورات العامة في الفايربيس (جلب فوري ومستمر لكل الناس)
                    listenToPublicMessages();

                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('chatScreen').style.display = 'grid';
                    
                    updateHeaderDisplay();
                } catch (error) {
                    console.error(error);
                    alert("فشل ربط البيانات: " + error.message);
                }
            } else {
                alert("يرجى فتح التطبيق من متصفح محفظة العملات المعتمدة!");
            }
        }

        async function refreshUserData() {
            if (!chatContract || !userAddress) return;
            try {
                const rawBalance = await chatContract.getInAppBalance(userAddress);
                inAppBalance = parseInt(rawBalance.toString());

                const cText = await chatContract.costText();
                const cImage = await chatContract.costImage();
                const cVoice = await chatContract.costVoice();
                
                priceText = parseFloat(ethers.utils.formatEther(cText));
                priceImage = parseFloat(ethers.utils.formatEther(cImage));
                priceVoice = parseFloat(ethers.utils.formatEther(cVoice));
            } catch (err) {
                console.error("خطأ قراءة أسعار الرصيد: ", err);
            }
            updateHeaderDisplay();
        }

        // دالة فايربيس السحرية: تجلب كل الرسائل السابقة وتراقب أي منشور جديد فوراً بدون تحديث الصفحة
        function listenToPublicMessages() {
            db.ref("public_messages").on("child_added", (snapshot) => {
                const data = snapshot.val();
                displayMessageInUI(data.type, data.content, data.sender.toLowerCase() === userAddress.toLowerCase(), data.sender, true);
            });
        }

        async function handleUIDeposit() {
            const amountInput = document.getElementById('depositAmount');
            const val = amountInput.value.trim();
            if(!val || parseFloat(val) <= 0) return alert("يرجى كتابة كمية شحن صالحة!");
            
            try {
                const amountWei = ethers.utils.parseEther(val);
                const approveTx = await tokenContract.approve(chatContractAddress, amountWei);
                await approveTx.wait();
                
                const depositTx = await chatContract.depositSinu(amountWei);
                await depositTx.wait();
                
                alert("تم شحن الرصيد بنجاح! 🎉");
                await refreshUserData();
            } catch (error) {
                alert("فشلت عملية الإيداع: " + error.message);
            }
        }

        function switchChatMode(mode) {
            isGroupChat = (mode === 'group');
            const recipientRow = document.getElementById('recipientRow');
            document.getElementById('messagesArea').innerHTML = ""; // تنظيف الشاشة عند التنقل
            
            if (isGroupChat) {
                document.getElementById('tabGroup').classList.add('active');
                document.getElementById('tabPrivate').classList.remove('active');
                recipientRow.style.display = 'none'; 
                listenToPublicMessages(); // إعادة تفعيل جلب العام
            } else {
                document.getElementById('tabGroup').classList.remove('active');
                document.getElementById('tabPrivate').classList.add('active');
                recipientRow.style.display = 'flex'; 
                db.ref("public_messages").off(); // إيقاف العام مؤقتاً بالخاص
                
                // رسالة ترحيبية في الخاص
                displayMessageInUI(1, "أنت الآن في قسم الرسائل الخاصة الآمنة، سيتم الخصم من رصيدك في العقد تلقائياً عند الإرسال.", false, "نظام الحماية", false);
            }
            updateHeaderDisplay();
        }

        function updateHeaderDisplay() {
            const header = document.getElementById('chatHeader');
            if (!header) return;
            
            if (isGroupChat) {
                header.innerHTML = `ساحة المنشورات العامة 🌐 | <span style="color: #00ff88; font-weight: bold;">مجانية وسريعة للجميع عبر قاعدة البيانات</span> | رصيدك: ${inAppBalance} SINU`;
            } else {
                header.innerHTML = `المراسلة الخاصة الآمنة 🔒 | رصيدك في العقد: <span style="color:#00ff88; font-weight:bold;">${inAppBalance} SINU</span><br>
                <small style="color:#f3ba2f; font-weight: bold;">تكلفة الاستهلاك: نص ${priceText} | صورة ${priceImage} | صوت ${priceVoice} SINU</small>`;
            }
        }

        function handleLocalFileChange(inputElement, serviceType) {
            if (!isGroupChat) {
                const recipientInput = document.getElementById('recipientAddress');
                const recipient = recipientInput.value.trim();
                if (recipient === "" || !recipient.startsWith("0x") || recipient.length !== 42) {
                    inputElement.value = "";
                    return alert("يرجى كتابة عنوان محفظة المستلم أولاً!");
                }
            }

            const file = inputElement.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                sendMessage(serviceType, e.target.result);
                inputElement.value = ""; 
            };
            reader.readAsDataURL(file);
        }

        async function toggleVoiceRecording() {
            if (!isGroupChat) {
                const recipientInput = document.getElementById('recipientAddress');
                const recipient = recipientInput.value.trim();
                if (recipient === "" || !recipient.startsWith("0x") || recipient.length !== 42) {
                    return alert("يرجى كتابة عنوان محفظة المستلم أولاً!");
                }
            }

            const recordBtn = document.getElementById('voiceRecordBtn');

            if (!isRecording) {
                if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                        mediaRecorder = new MediaRecorder(stream);
                        audioChunks = [];

                        mediaRecorder.ondataavailable = function(e) {
                            audioChunks.push(e.data);
                        };

                        mediaRecorder.onstop = function() {
                            const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                            const reader = new FileReader();
                            reader.onload = function(e) {
                                sendMessage(3, e.target.result); 
                            };
                            reader.readAsDataURL(audioBlob);
                            stream.getTracks().forEach(track => track.stop());
                        };

                        mediaRecorder.start();
                        isRecording = true;
                        recordBtn.classList.add('recording');
                    } catch (err) {
                        alert("فشل فتح الميكروفون: " + err.message);
                    }
                }
            } else {
                if (mediaRecorder && mediaRecorder.state !== "inactive") {
                    mediaRecorder.stop();
                }
                isRecording = false;
                recordBtn.classList.remove('recording');
            }
        }

        async function sendMessage(serviceType = 1, mediaData = "") { 
            const input = document.getElementById('messageInput');
            const recipientInput = document.getElementById('recipientAddress');
            let text = serviceType === 1 ? input.value.trim() : mediaData;

            if (text === "") return;

            if (isGroupChat) {
                // حفظ المنشور في قاعدة بيانات Firebase مجاناً وبدون غاز ليراه الجميع فوراً
                db.ref("public_messages").push({
                    sender: userAddress,
                    content: text,
                    type: serviceType,
                    timestamp: Date.now()
                });
                if (serviceType === 1) input.value = "";
            } else {
                // التعامل مع القسم الخاص المدفوع عبر العقد الذكي
                const recipient = recipientInput.value.trim();
                if (recipient === "" || !recipient.startsWith("0x") || recipient.length !== 42) {
                    return alert("يرجى إدخال عنوان محفظة مستلم صحيح!");
                }

                let currentCost = parseFloat(priceText);
                if (serviceType === 2) currentCost = parseFloat(priceImage);
                if (serviceType === 3) currentCost = parseFloat(priceVoice);

                if (inAppBalance < currentCost) {
                    alert(`رصيدك غير كافٍ! تحتاج إلى ${currentCost} SINU.`);
                    return;
                }
                
                try {
                    // المالك (أو السيرفر) يستدعي دالة الخصم من المستخدم لإتمام الخدمة
                    const tx = await chatContract.deductForService(userAddress, serviceType);
                    await tx.wait();
                    inAppBalance -= currentCost;
                    updateHeaderDisplay();
                    
                    displayMessageInUI(serviceType, text, true, userAddress, false);
                    if (serviceType === 1) input.value = "";
                } catch(e) {
                    alert("فشل تأكيد المعاملة البرمجية: " + e.message);
                }
            }
        }

        function displayMessageInUI(serviceType, content, isSent, senderAddress, isPublicMsg) {
            const area = document.getElementById('messagesArea');
            const msgDiv = document.createElement('div');
            msgDiv.className = isSent ? 'message sent' : 'message received';
            
            msgDiv.style.borderLeft = isPublicMsg ? "4px solid #00ff88" : "4px solid #f3ba2f";
            
            let shortSender = senderAddress;
            if(senderAddress.startsWith("0x")) {
                shortSender = senderAddress.substring(0, 6) + "..." + senderAddress.substring(38);
            }
            
            const titleSpan = document.createElement('small');
            titleSpan.style.cssText = "color:#aaa; display:block; margin-bottom:4px; font-weight:bold; font-size:0.75rem;";
            titleSpan.innerText = isPublicMsg ? `🌐 منشور عام من: ${shortSender}` : `🔒 رسالة خاصة`;
            msgDiv.appendChild(titleSpan);

            if (serviceType === 1) {
                const textNode = document.createTextNode(content);
                msgDiv.appendChild(textNode);
            } else if (serviceType === 2) {
                const img = document.createElement('img');
                img.src = content;
                msgDiv.appendChild(img);
            } else if (serviceType === 3) {
                const audio = document.createElement('audio');
                audio.src = content;
                audio.controls = true;
                msgDiv.appendChild(audio);
            }

            area.appendChild(msgDiv);
            area.scrollTop = area.scrollHeight;
        }

        function playGame(gameType) {
            alert(`جاري تجهيز واجهة لعبة [${gameType}] للربط مع العقد الذكي لـ SINU...`);
        }
    </script>
</body>
</html>
